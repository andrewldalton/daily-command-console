<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2433"/>
      <stop offset="100%" stop-color="#141821"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="d-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bolt-glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full bleed background - iOS adds its own rounded corners -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Letter D - scaled up to fill the icon -->
  <g filter="url(#glow)">
    <!-- D vertical stroke -->
    <rect x="88" y="60" width="62" height="392" rx="6" fill="url(#d-fill)"/>
    <!-- D curve - thick arc -->
    <path d="M 119 60
             C 119 60, 420 60, 420 256
             C 420 452, 119 452, 119 452"
          fill="none" stroke="url(#d-fill)" stroke-width="62" stroke-linecap="round"/>
  </g>

  <!-- Lightning bolt cutting through diagonally - scaled up -->
  <g filter="url(#bolt-glow)">
    <polygon points="340,40 230,250 310,250 200,472 370,210 290,210 370,40" fill="url(#bolt)"/>
  </g>

  <!-- Lightning reflection/shine -->
  <polygon points="340,40 230,250 310,250 200,472 370,210 290,210 370,40" fill="white" opacity="0.12"/>
</svg>
