<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#181c28" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Daily Command Console</title>
    <script>
      (function(){
        var t = 'dark';
        try { t = localStorage.getItem('dcc_theme') || 'dark'; } catch(e){}
        document.documentElement.dataset.theme = t;
        document.documentElement.style.background = t === 'light' ? '#f8f9fc' : '#181c28';
      })();
    </script>
  </head>
  <body style="background: #181c28;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
